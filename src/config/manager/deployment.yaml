apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-cpu-operator
  namespace: kube-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: startup-cpu-operator
  template:
    metadata:
      labels:
        app: startup-cpu-operator
    spec:
      serviceAccountName: startup-cpu-operator
      containers:
      - name: manager
        image: startup-cpu-operator:latest
        command:
        - /manager
        args:
        - --leader-elect
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
